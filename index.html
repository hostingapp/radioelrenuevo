<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Radio El Renuevo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
html, body {
  margin:0;
  height:100%;
  background:#000;
  font-family:Arial;
}

.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:space-evenly;
  align-items:center;
  text-align:center;
  color:white;
  padding:20px;
  background:url('https://i.ibb.co/bRX92GPm/Bienvenidos.png') center/cover no-repeat;
  position:relative;
}

.container::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter: blur(6px);
}

.container *{ position:relative; }

/* LOGO */
.logo{
  width:70%;
  max-width:280px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(255,255,255,0.25);
}

/* ESTADO */
.live{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:16px;
}

.dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:red;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{opacity:.3;}
  50%{opacity:1;}
  100%{opacity:.3;}
}

/* 🎵 BARRAS MUSICALES */
.bars{
  display:flex;
  align-items:flex-end;
  gap:4px;
  height:40px;
  margin-top:10px;
}

.bar{
  width:5px;
  height:10px;
  background:#22c55e;
  border-radius:3px;
  animation:move 1s infinite ease-in-out;
  animation-play-state: paused;
}

/* animación diferente para cada barra */
.bar:nth-child(1){ animation-delay:0s; }
.bar:nth-child(2){ animation-delay:0.2s; }
.bar:nth-child(3){ animation-delay:0.4s; }
.bar:nth-child(4){ animation-delay:0.6s; }
.bar:nth-child(5){ animation-delay:0.8s; }

@keyframes move{
  0%,100%{ height:10px; }
  50%{ height:35px; }
}

/* BOTÓN */
.main-btn{
  width:90px;
  height:90px;
  border-radius:50%;
  border:none;
  font-size:32px;
  color:white;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  box-shadow:0 0 25px #22c55e;
  transition:.3s;
}

.pause-mode{
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  box-shadow:0 0 25px #ef4444;
}

/* VOLUMEN */
.volume{
  width:90%;
  max-width:320px;
}

button,input{ -webkit-tap-highlight-color:transparent; }
</style>
</head>

<body>

<div class="container">

<img src="https://i.ibb.co/bfpGY16/Dise-o-sin-t-tulo.png" class="logo">

<div class="live">
  <div class="dot"></div>
  <span id="status">CONECTANDO...</span>
</div>

<!-- 🎵 BARRAS -->
<div class="bars" id="bars">
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
  <div class="bar"></div>
</div>

<button id="btn" class="main-btn" onclick="toggle()">
<i class="fas fa-play"></i>
</button>

<input id="vol" type="range" min="0" max="1" step="0.01" class="volume">

</div>

<audio id="radio" src="https://stream.zeno.fm/e5z6uzk5aa9uv"></audio>

<script>
const r = document.getElementById("radio");
const b = document.getElementById("btn");
const statusTxt = document.getElementById("status");
const bars = document.querySelectorAll(".bar");
const volSlider = document.getElementById("vol");

let play = false;

/* volumen */
let savedVol = localStorage.getItem("vol") || 0.8;
r.volume = savedVol;
volSlider.value = savedVol;

volSlider.oninput = (e)=>{
  r.volume = e.target.value;
  localStorage.setItem("vol", e.target.value);
}

/* activar barras */
function barsOn(){
  bars.forEach(bar => bar.style.animationPlayState = "running");
}

/* detener barras */
function barsOff(){
  bars.forEach(bar => bar.style.animationPlayState = "paused");
}

/* PLAY / PAUSE */
async function toggle(){
  if(navigator.vibrate) navigator.vibrate(50);

  if(!play){
    try{
      await r.play();
      play=true;
      b.innerHTML='<i class="fas fa-pause"></i>';
      b.classList.add("pause-mode");
      statusTxt.innerText="EN VIVO 🔴";
      barsOn();
    }catch(e){
      statusTxt.innerText="ERROR";
    }
  }else{
    r.pause();
    play=false;
    b.innerHTML='<i class="fas fa-play"></i>';
    b.classList.remove("pause-mode");
    statusTxt.innerText="PAUSADO";
      barsOff();
  }
}

/* eventos */
r.addEventListener("waiting", ()=> {
  statusTxt.innerText="CARGANDO...";
  barsOff();
});

r.addEventListener("playing", ()=> {
  statusTxt.innerText="EN VIVO 🔴";
  barsOn();
});

r.addEventListener("error", ()=> {
  statusTxt.innerText="SIN SEÑAL";
  barsOff();
});
</script>

</body>
</html>
