<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Radio El Renuevo</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

button{
  padding:20px 30px;
  font-size:20px;
  border:none;
  border-radius:50px;
  background:#22c55e;
  color:white;
}
</style>
</head>

<body>

<div>
  <h2>Radio El Renuevo</h2>
  <p id="status">Listo</p>

  <button onclick="toggle()" id="btn">▶ Play</button>
</div>

<audio id="radio" preload="auto" src="https://stream.zeno.fm/e5z6uzk5aa9uv"></audio>

<script>
const radio = document.getElementById("radio");
const btn = document.getElementById("btn");
const status = document.getElementById("status");

let playing = false;

/* 🔊 PLAY / PAUSE */
async function toggle(){
  try{
    if(!playing){
      await radio.play();
      playing = true;
      btn.innerHTML = "⏸ Pause";
      status.innerText = "En vivo 🔴";
    }else{
      radio.pause();
      playing = false;
      btn.innerHTML = "▶ Play";
      status.innerText = "Pausado";
    }
  }catch(e){
    status.innerText = "Error de reproducción";
  }
}

/* 🔁 RECONEXIÓN AUTOMÁTICA */
setInterval(()=>{
  if(playing && radio.paused){
    radio.play().catch(()=>{});
  }
}, 3000);

/* 📱 MANTENER AUDIO EN SEGUNDO PLANO */
document.addEventListener("visibilitychange", function () {
  if (playing && radio.paused) {
    radio.play().catch(()=>{});
  }
});

/* 🔋 INTENTO DE RECUPERACIÓN EN ANDROID */
window.addEventListener("focus", ()=>{
  if(playing){
    radio.play().catch(()=>{});
  }
});

/* 🚨 FALLBACK SI SE CAE EL STREAM */
radio.addEventListener("waiting", ()=>{
  status.innerText = "Reconectando...";
});

radio.addEventListener("playing", ()=>{
  status.innerText = "En vivo 🔴";
});

radio.addEventListener("error", ()=>{
  status.innerText = "Sin señal, reintentando...";
  setTimeout(()=>radio.play().catch(()=>{}), 2000);
});
</script>

</body>
</html>
